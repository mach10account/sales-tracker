<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1a">
<title>Sales Tracker</title>
<style>
  :root{
    --bg:#0b0f1a; --bg2:#121829; --card:#161d31; --card2:#1d2740;
    --line:#243049; --txt:#eef2fb; --mut:#8b97b3; --mut2:#647093;
    --acc:#4f7cff; --acc2:#6f93ff; --ok:#22c98a; --bad:#ff5c72; --warn:#ffb13d;
    --r:16px; --tap:64px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0; height:100%}
  body{
    background:linear-gradient(180deg,#0b0f1a,#0a0e18 40%,#080b14);
    color:var(--txt); font:16px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior-y:none; -webkit-font-smoothing:antialiased;
  }
  #app{max-width:520px; margin:0 auto; min-height:100%; padding:0 16px calc(28px + env(safe-area-inset-bottom)); display:flex; flex-direction:column}
  .topbar{position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:10px; padding:14px 0 10px; background:linear-gradient(180deg,#0b0f1a 70%,rgba(11,15,26,0)); }
  .topbar h1{font-size:18px; margin:0; font-weight:700; letter-spacing:.2px; flex:1}
  .iconbtn{width:42px; height:42px; border-radius:12px; border:1px solid var(--line); background:var(--card); color:var(--txt); font-size:18px; display:flex; align-items:center; justify-content:center; flex:0 0 auto}
  .iconbtn:active{transform:scale(.94)}
  .back{font-size:15px; color:var(--mut); background:none; border:none; padding:6px 4px; display:flex; align-items:center; gap:4px}
  .progress{height:5px; background:var(--card); border-radius:99px; overflow:hidden; margin:2px 0 18px}
  .progress>i{display:block; height:100%; background:linear-gradient(90deg,var(--acc),var(--acc2)); border-radius:99px; transition:width .25s ease}
  .q{font-size:25px; font-weight:750; line-height:1.18; margin:6px 2px 4px; letter-spacing:-.3px}
  .qsub{color:var(--mut); font-size:14px; margin:0 2px 20px}
  .opts{display:flex; flex-direction:column; gap:12px; margin-top:6px}
  .opt{min-height:var(--tap); border:1.5px solid var(--line); background:var(--card); color:var(--txt);
    border-radius:var(--r); font-size:18px; font-weight:600; text-align:start; padding:0 18px; display:flex; align-items:center; gap:14px; transition:transform .08s, border-color .15s, background .15s}
  .opt .em{font-size:22px; width:26px; text-align:center; flex:0 0 auto}
  .opt:active{transform:scale(.985)}
  .opt.sel{border-color:var(--acc); background:rgba(79,124,255,.16); box-shadow:inset 0 0 0 1.5px var(--acc)}
  .opt.sel::after{content:"✓"; margin-inline-start:auto; color:var(--acc2); font-weight:800}
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px}
  .grid.g5{grid-template-columns:repeat(5,1fr); gap:8px}
  .grid.g5 .opt{justify-content:center; padding:0; font-size:19px; min-height:56px}
  .scoregrid{display:grid; grid-template-columns:repeat(5,1fr); gap:8px}
  .scoregrid .opt{justify-content:center; padding:0; min-height:52px; font-size:18px}
  .btn{min-height:58px; border-radius:14px; border:none; font-size:18px; font-weight:700; width:100%; display:flex; align-items:center; justify-content:center; gap:8px}
  .btn:active{transform:scale(.985)}
  .btn.primary{background:linear-gradient(180deg,var(--acc2),var(--acc)); color:#fff; box-shadow:0 8px 22px -10px var(--acc)}
  .btn.ghost{background:var(--card); color:var(--txt); border:1.5px solid var(--line)}
  .btn.ok{background:linear-gradient(180deg,#2fe0a0,var(--ok)); color:#06231a}
  .btn:disabled{opacity:.4}
  .sticky{position:sticky; bottom:0; padding:14px 0 calc(8px + env(safe-area-inset-bottom)); background:linear-gradient(0deg,#080b14 65%,rgba(8,11,20,0)); margin-top:auto; display:flex; gap:10px}
  .sticky .btn{flex:1}
  .spacer{flex:1}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px}
  .muted{color:var(--mut)}
  .small{font-size:13px}
  .pill{display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:99px; font-size:12.5px; font-weight:650; background:var(--card2); border:1px solid var(--line); color:var(--mut)}
  .pill.ok{color:var(--ok); border-color:rgba(34,201,138,.4); background:rgba(34,201,138,.1)}
  .pill.bad{color:var(--bad); border-color:rgba(255,92,114,.4); background:rgba(255,92,114,.1)}
  .pill.warn{color:var(--warn); border-color:rgba(255,177,61,.4); background:rgba(255,177,61,.1)}
  input[type=text],input[type=date],textarea,select{
    width:100%; background:var(--card); border:1.5px solid var(--line); color:var(--txt);
    border-radius:13px; padding:15px 14px; font-size:17px; outline:none; font-family:inherit}
  input:focus,textarea:focus,select:focus{border-color:var(--acc)}
  textarea{resize:vertical; min-height:74px}
  label.fld{display:block; margin:16px 0 7px; font-size:13px; color:var(--mut); font-weight:650; text-transform:uppercase; letter-spacing:.4px}
  /* home */
  .bignew{min-height:96px; font-size:22px; border-radius:22px; background:linear-gradient(135deg,var(--acc2),var(--acc)); color:#fff; border:none; width:100%; font-weight:800; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; box-shadow:0 18px 40px -16px var(--acc); margin-bottom:18px}
  .bignew small{font-weight:600; opacity:.85; font-size:13px}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .tile{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:16px; text-align:start; color:var(--txt)}
  .tile .n{font-size:28px; font-weight:800; line-height:1}
  .tile .l{color:var(--mut); font-size:13px; margin-top:4px}
  .navtile{display:flex; align-items:center; gap:12px; font-size:17px; font-weight:650}
  .navtile .em{font-size:22px}
  .sec{font-size:13px; text-transform:uppercase; letter-spacing:.6px; color:var(--mut2); font-weight:700; margin:22px 2px 10px}
  /* funnel */
  .stage{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line)}
  .stage:last-child{border-bottom:none}
  .stage .nm{flex:1; font-size:15px; font-weight:600}
  .stage .nm small{display:block; color:var(--mut2); font-weight:500; font-size:11px}
  .seg{display:flex; gap:5px; flex:0 0 auto}
  .seg button{width:38px; height:38px; border-radius:10px; border:1.5px solid var(--line); background:var(--card2); color:var(--mut); font-size:15px; font-weight:700}
  .seg button.p.on{background:rgba(34,201,138,.18); border-color:var(--ok); color:var(--ok)}
  .seg button.f.on{background:rgba(255,92,114,.18); border-color:var(--bad); color:var(--bad)}
  .seg button.x.on{background:rgba(255,177,61,.18); border-color:var(--warn); color:var(--warn)}
  .fab{position:sticky; bottom:84px; margin-inline-start:auto; width:max-content; align-self:flex-end}
  .objbtn{background:var(--card); border:1.5px solid var(--acc); color:var(--acc2); border-radius:99px; padding:11px 18px; font-weight:700; font-size:15px; box-shadow:0 8px 20px -10px #000; display:flex; align-items:center; gap:8px}
  .badge{background:var(--bad); color:#fff; border-radius:99px; font-size:11px; padding:1px 7px; font-weight:800}
  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(4,6,12,.72); backdrop-filter:blur(4px); z-index:60; display:flex; align-items:flex-end; justify-content:center; animation:fade .18s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{width:100%; max-width:520px; background:var(--bg2); border:1px solid var(--line); border-bottom:none; border-radius:22px 22px 0 0; padding:18px 16px calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow:auto; animation:up .22s cubic-bezier(.2,.8,.2,1)}
  @keyframes up{from{transform:translateY(40px); opacity:.4}to{transform:translateY(0); opacity:1}}
  .sheet h3{margin:2px 0 14px; font-size:20px}
  .chips{display:flex; flex-wrap:wrap; gap:9px}
  .chip{border:1.5px solid var(--line); background:var(--card); color:var(--txt); border-radius:12px; padding:11px 13px; font-size:15px; font-weight:600}
  .chip.sel{border-color:var(--acc); background:rgba(79,124,255,.16); color:var(--acc2)}
  /* analytics */
  .seg2{display:flex; gap:6px; overflow-x:auto; padding:2px 0 4px; margin:0 -2px 14px; scrollbar-width:none}
  .seg2::-webkit-scrollbar{display:none}
  .seg2 button{flex:0 0 auto; padding:9px 14px; border-radius:99px; border:1.5px solid var(--line); background:var(--card); color:var(--mut); font-size:14px; font-weight:650}
  .seg2 button.on{background:var(--acc); border-color:var(--acc); color:#fff}
  .statrow{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:6px}
  .stat{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 14px}
  .stat .n{font-size:24px; font-weight:800; line-height:1}
  .stat .l{color:var(--mut); font-size:12.5px; margin-top:3px}
  .stat .d{font-size:12px; font-weight:700; margin-top:5px}
  .up{color:var(--ok)} .down{color:var(--bad)}
  .bar{display:flex; align-items:center; gap:9px; margin:9px 0}
  .bar .bl{width:104px; font-size:13px; color:var(--txt); flex:0 0 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .bar .bt{flex:1; height:22px; background:var(--card2); border-radius:7px; overflow:hidden; position:relative}
  .bar .bt>i{display:block; height:100%; background:linear-gradient(90deg,var(--acc),var(--acc2)); border-radius:7px; min-width:2px}
  .bar .bt.green>i{background:linear-gradient(90deg,#1fae79,var(--ok))}
  .bar .bt.red>i{background:linear-gradient(90deg,#e0455a,var(--bad))}
  .bar .bv{width:54px; text-align:end; font-size:13px; font-weight:700; flex:0 0 auto}
  .bar .bv small{color:var(--mut2); font-weight:500}
  .insight{display:flex; gap:11px; padding:13px; background:var(--card); border:1px solid var(--line); border-inline-start:3px solid var(--acc); border-radius:12px; margin-bottom:10px; font-size:14.5px; line-height:1.45}
  .insight .em{font-size:18px; flex:0 0 auto}
  .empty{text-align:center; color:var(--mut); padding:42px 20px}
  .empty .em{font-size:42px; display:block; margin-bottom:10px}
  /* history */
  .hcard{display:flex; gap:12px; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 14px; margin-bottom:10px}
  .hcard .av{width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; background:var(--card2); flex:0 0 auto}
  .hcard .t{flex:1; min-width:0}
  .hcard .t .nm{font-weight:700; font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .hcard .t .mt{color:var(--mut); font-size:12.5px; margin-top:2px}
  .note{background:rgba(255,177,61,.1); border:1px solid rgba(255,177,61,.4); border-radius:12px; padding:13px; margin:12px 0; font-size:14.5px}
  .note b{color:var(--warn)}
  .kv{display:flex; justify-content:space-between; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); font-size:14.5px}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--mut)} .kv .v{font-weight:650; text-align:end}
  .toast{position:fixed; left:50%; bottom:calc(24px + env(safe-area-inset-bottom)); transform:translateX(-50%); background:var(--card2); border:1px solid var(--line); color:var(--txt); padding:12px 18px; border-radius:99px; font-size:14px; font-weight:600; z-index:80; box-shadow:0 12px 30px -8px #000; animation:fade .2s; max-width:90%; text-align:center}
  .toast.ok{border-color:var(--ok); color:var(--ok)} .toast.bad{border-color:var(--bad); color:var(--bad)}
  .savedwrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:14px; padding:40px 0}
  .check{width:96px; height:96px; border-radius:50%; background:rgba(34,201,138,.14); border:2px solid var(--ok); display:flex; align-items:center; justify-content:center; font-size:48px; color:var(--ok)}
</style>
</head>

/* ============================ STORE ============================ */
async function post(body){
  const r = await fetch(LS.url, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const txt = await r.text();
  try{ return txt ? JSON.parse(txt) : {ok:true}; }catch(e){ return {ok:true}; }
}
function demoCalls(){ try{return JSON.parse(localStorage.getItem("st_calls")||"[]")}catch(e){return []} }
function demoSave(arr){ localStorage.setItem("st_calls", JSON.stringify(arr)); }

const Store = {
  async list(){
    if(useDemo()) return demoCalls();
    const r = await post({action:"list"});
    const arr = Array.isArray(r) ? r : (r.calls||r.data||[]);
    return arr.filter(x=>x&&x.id).map(normalize);
  },
  async save(c){
    if(useDemo()){ const a=demoCalls(); a.push(c); demoSave(a); return; }
    await post({action:"save", call:serialize(c)});
  },
  async update(c){
    if(useDemo()){ const a=demoCalls().map(x=>x.id===c.id?c:x); demoSave(a); return; }
    await post({action:"update", call:serialize(c)});
  },
  async del(id){
    if(useDemo()){ demoSave(demoCalls().filter(x=>x.id!==id)); return; }
    await post({action:"delete", id});
  }
};
// flatten objects → strings for the Sheet; rebuild on read
function serialize(c){
  return {...c,
    collateral:(c.collateral||[]).join("|"),
    funnel:JSON.stringify(c.funnel||{}),
    objections:JSON.stringify(c.objections||[]),
  };
}
function normalize(r){
  const p = (v,d)=>{ try{return JSON.parse(v)}catch(e){return d} };
  return {...r,
    collateral: typeof r.collateral==="string" ? (r.collateral?r.collateral.split("|"):[]) : (r.collateral||[]),
    funnel: typeof r.funnel==="string" ? p(r.funnel,{}) : (r.funnel||{}),
    objections: typeof r.objections==="string" ? p(r.objections,[]) : (r.objections||[]),
    closingProbability:+r.closingProbability||null,
    callQuality:+r.callQuality||null, trustLevel:+r.trustLevel||null, urgency:+r.urgency||null,
  };
}

function progress(step,total){ return `<div class="progress"><i style="width:${pct(step,total)}%"></i></div>`; }
function hcard(c){
  return `<button class="hcard" data-act="detail" data-val="${c.id}" style="width:100%">
    <div class="av">${outcomeEmoji(c.outcome)}</div>
    <div class="t"><div class="nm">${esc(c.prospectName||t("unnamed"))} ${c.followUpDate&&c.outcome!=="Closed"&&c.outcome!=="Lost"?`<span class="pill warn" style="padding:1px 8px; font-size:11px">↻ ${fmtDate(c.followUpDate)}</span>`:""}</div>

  </button>`;
}
function outcomeEmoji(o){ const m=Object.fromEntries(OUTCOMES); return m[o]||"📞"; }
function barBlock(title, rows, opts){
  opts=opts||{}; const raw=opts.raw, color=opts.color, tr=opts.tr;
  if(!rows || !rows.length) return "";
  const max = Math.max(...rows.map(r=>raw?r.v:100), 1);
  return `<div class="sec">${esc(title)}</div><div class="card">${rows.map(r=>`
    <div class="bar"><span class="bl">${esc(tr?tr(r.label):r.label)}</span>
    <span class="bt ${color||(raw?"":"green")}"><i style="width:${raw? (r.v/max*100) : r.v}%"></i></span>
    <span class="bv">${raw? r.v : r.v+"%"}<small>${r.n!=null?" /"+r.n:""}</small></span></div>`).join("")}</div>`;
}
function funnelBars(S){
  const base = S.funnelCounts[0]||1;
  return FUNNEL.map(([nm],i)=>{ const n=S.funnelCounts[i]; const drop = i>0? S.funnelCounts[i-1]-n : 0;
    return `<div class="bar"><span class="bl">${esc(lbl("stage",nm))}</span>
    <span class="bt"><i style="width:${pct(n,base)}%"></i></span>
    <span class="bv">${n}${drop>0?` <small style="color:var(--bad)">−${drop}</small>`:""}</span></div>`;
  }).join("");
}
function stagePassBars(S){
  return FUNNEL.map(([nm],i)=>{ const r=S.stageReached[i], p=S.stagePassed[i]; if(!r) return "";
    const v=pct(p,r);
    return `<div class="bar"><span class="bl">${esc(lbl("stage",nm))}</span>
    <span class="bt ${v>=60?"green":(v<35?"red":"")}"><i style="width:${v}%"></i></span>
    <span class="bv">${v}%<small> /${r}</small></span></div>`;
  }).join("");
}

/* ============================ ANALYTICS ENGINE (canonical English keys) ============================ */
function stats(calls){
  const total = calls.length;
  const closedArr = calls.filter(c=>c.outcome==="Closed");
  const closed = closedArr.length;
  const closeRate = pct(closed,total);
  const S = {total, closed, closeRate, calls};

  S.byCloseRate = (key)=>{
    const g={}; calls.forEach(c=>{ const k=c[key]; if(!k) return; (g[k]=g[k]||{n:0,c:0}); g[k].n++; if(c.outcome==="Closed") g[k].c++; });
    return Object.entries(g).map(([label,o])=>({label, v:pct(o.c,o.n), n:o.n})).sort((a,b)=>b.v-a.v);
  };
  S.byScore = (key)=>{
    const g={}; calls.forEach(c=>{ const k=c[key]; if(!k) return; (g[k]=g[k]||{n:0,c:0}); g[k].n++; if(c.outcome==="Closed") g[k].c++; });
    return Object.keys(g).sort((a,b)=>a-b).map(k=>({label:k+"/10", v:pct(g[k].c,g[k].n), n:g[k].n}));
  };
  S.funnelCounts = STAGES.map((s,i)=> calls.filter(c=>furthest(c.funnel||{})>=i).length);
  S.stageReached = STAGES.map(s=> calls.filter(c=>(c.funnel||{})[s]).length);
  S.stagePassed  = STAGES.map(s=> calls.filter(c=>(c.funnel||{})[s]==="Passed").length);
  const depIdx=STAGES.indexOf("Deposit Paid"), conSentIdx=STAGES.indexOf("Contract Sent");
  const conSignIdx=STAGES.indexOf("Contract Signed");
  S.depToContract = Math.min(100, pct(S.stagePassed[conSentIdx], S.stagePassed[depIdx]));
  S.contractToClose = Math.min(100, pct(closed, S.stagePassed[conSignIdx]));
  const freq={}, kill={}; let lost=calls.filter(c=>c.outcome==="Lost"||c.outcome==="Not Qualified");
  calls.forEach(c=>(c.objections||[]).forEach(o=> freq[o.type]=(freq[o.type]||0)+1 ));
  lost.forEach(c=>{ const types=new Set((c.objections||[]).map(o=>o.type)); types.forEach(ty=> kill[ty]=(kill[ty]||0)+1 ); });
  S.objFreq = Object.entries(freq).map(([label,v])=>({label,v})).sort((a,b)=>b.v-a.v);
  S.objKill = Object.entries(kill).map(([label,v])=>({label, v:pct(v, lost.length)})).sort((a,b)=>b.v-a.v);
  S.lostCount = lost.length;
  const dg={}, hg={};
  calls.forEach(c=>{ const d=new Date(c.timestamp); const di=d.getDay(); (dg[di]=dg[di]||{n:0,c:0}); dg[di].n++; if(c.outcome==="Closed")dg[di].c++;
    const h=d.getHours(); (hg[h]=hg[h]||{n:0,c:0}); hg[h].n++; if(c.outcome==="Closed")hg[h].c++; });
  S.byDay = DOW.map((d,i)=>i).filter(i=>dg[i]).map(i=>({di:i, label:DOW[i], v:pct(dg[i].c,dg[i].n), n:dg[i].n}));
  S.byHour = Object.keys(hg).sort((a,b)=>a-b).map(h=>({label:h+":00", v:pct(hg[h].c,hg[h].n), n:hg[h].n}));
  const q=calls.map(c=>c.callQuality).filter(x=>x); S.avgQuality = q.length? (q.reduce((a,b)=>a+b,0)/q.length).toFixed(1):null;
  let bd=0,bdi=-1; for(let i=1;i<S.funnelCounts.length;i++){ const d=S.funnelCounts[i-1]-S.funnelCounts[i]; if(d>bd){bd=d;bdi=i;} }
  S.biggestDrop = bdi>=0? {stage:STAGES[bdi], n:bd, from:STAGES[bdi-1]} : null;
  return S;
}

function insights(S, P){
  const out=[];
  const push=(em,txt)=> out.push(`<div class="insight"><span class="em">${em}</span><span>${txt}</span></div>`);
  if(S.total<3){ push("🌱", t("insKeepLogging")); }
  const pt=S.byCloseRate("prospectType").filter(r=>r.n>=2);
  if(pt.length>=2 && pt[0].v>pt[pt.length-1].v){
    const lo=pt[pt.length-1];
    push("🎯", fmt(t("insBestType"), {type:`<b>${esc(lbl("prospectType",pt[0].label))}</b>`, v:pt[0].v, lo:esc(lbl("prospectType",lo.label)), loV:lo.v}));
  }
  const ls=S.byCloseRate("loanSize").filter(r=>r.n>=2);
  if(ls.length>=2 && ls[0].v>0) push("💰", fmt(t("insBestLoan"), {label:`<b>${esc(lbl("loanSize",ls[0].label))}</b>`, v:ls[0].v}));
  if(S.biggestDrop && S.biggestDrop.n>0) push("🕳️", fmt(t("insBiggestDrop"), {from:esc(lbl("stage",S.biggestDrop.from)), stage:esc(lbl("stage",S.biggestDrop.stage)), n:S.biggestDrop.n}));
  if(S.objKill.length && S.objKill[0].v>0) push("⚠️", fmt(t("insTopObjection"), {label:`<b>${esc(lbl("objection",S.objKill[0].label))}</b>`, v:S.objKill[0].v}));
  const bd=S.byDay.filter(r=>r.n>=2).sort((a,b)=>b.v-a.v)[0];
  if(bd && bd.v>0) push("📅", fmt(t("insBestDay"), {day:`<b>${esc(dayFull(bd.di))}</b>`, v:bd.v}));
  const hq=S.calls.filter(c=>c.callQuality>=8); const hqc=hq.filter(c=>c.outcome==="Closed").length;
  if(hq.length>=2) push("⭐", fmt(t("insQuality"), {v:pct(hqc,hq.length), hqc:hqc, hq:hq.length}));
  if(P && P.total>=2 && S.total>=2){
    const d=S.closeRate-P.closeRate;
    if(d!==0) push(d>0?"📈":"📉", fmt(t(d>0?"insTrendUp":"insTrendDown"), {n:Math.abs(d)}));
  }
  return out.length? `<div class="sec">${esc(t("insightsSec"))}</div>${out.join("")}` : "";
}

/* ============================ PERIODS ============================ */
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function range(period, prev){
  const now=new Date(), y=now.getFullYear(), mo=now.getMonth(), q=Math.floor(mo/3);
  const d=startOfDay(now); let start, end;
  if(period==="all"){ if(prev) return {start:new Date(0), end:new Date(0)}; return {start:new Date(0), end:new Date(8.64e15)}; }
  if(period==="day"){
    if(prev){ start=new Date(d); start.setDate(start.getDate()-1); end=new Date(d); }
    else { start=new Date(d); end=new Date(d); end.setDate(end.getDate()+1); }
  }
  else if(period==="week"){ const wd=(now.getDay()+6)%7; const mon=new Date(d); mon.setDate(mon.getDate()-wd);
    if(prev){ end=new Date(mon); start=new Date(mon); start.setDate(start.getDate()-7); }
    else { start=new Date(mon); end=new Date(mon); end.setDate(end.getDate()+7); }
  }
  else if(period==="month"){ if(prev){ start=new Date(y,mo-1,1); end=new Date(y,mo,1); } else { start=new Date(y,mo,1); end=new Date(y,mo+1,1); } }
  else if(period==="quarter"){ if(prev){ start=new Date(y,q*3-3,1); end=new Date(y,q*3,1); } else { start=new Date(y,q*3,1); end=new Date(y,q*3+3,1); } }
  else if(period==="year"){ if(prev){ start=new Date(y-1,0,1); end=new Date(y,0,1); } else { start=new Date(y,0,1); end=new Date(y+1,0,1); } }
  return {start, end};
}
function inRange(calls, r){ return calls.filter(c=>{ const ti=new Date(c.timestamp); return ti>=r.start && ti<r.end; }); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function followUpsDue(calls){
  const today=startOfDay(new Date()); const soon=new Date(today); soon.setDate(soon.getDate()+1);
  return calls.filter(c=>c.followUpDate && c.outcome!=="Closed" && c.outcome!=="Lost" && c.outcome!=="Not Qualified")
    .filter(c=> parseDay(c.followUpDate) < soon )
    .sort((a,b)=> parseDay(a.followUpDate)-parseDay(b.followUpDate)).slice(0,5);
}

/* ============================ ACTIONS ============================ */
function handle(act, val, tg, e){
  switch(act){
    case "back": back(); break;
    case "home": reset("home"); break;
    case "nav": go(val); break;
    case "lang": setLang(LANG==="he"?"en":"he"); break;
    case "setlang": setLang(val); break;
    case "abort": if(confirm(t("discardCall"))){ call=null; reset("home"); } break;
    case "newcall": startCall(); break;
    case "qual": setQual(val); break;
    case "collat": toggleCollat(val); break;
    case "stage": setStage(val); break;
    case "outcome": call.outcome=val; render(); setTimeout(afterOutcome,140); break;
    case "prob": call.closingProbability=+val; render(); break;
    case "score": { const [k,n]=val.split("|"); call[k]=+n; render(); break; }
    case "afterEval": afterEval(); break;
    case "review": saveFollowupFields(); go("review"); break;
    case "save": doSave(); break;
    case "detail": go("detail",{id:val}); break;
    case "reopen": reopen(val); break;
    case "delcall": delCall(val); break;
    case "period": APERIOD=val; render(); break;
    case "objmodal": modal="obj"; openModal("obj"); break;
    case "closemodal": closeModal(); break;
    case "export": exportCSV(); break;
    case "reload": loadCache(true); break;
    case "sample": loadSample(); break;
    case "toggledemo": LS.demo=!LS.demo; cache=null; loadCache(); break;
    case "clearDemo": if(confirm(t("clearDemoConfirm"))){ demoSave([]); loadCache(true); } break;
    default: if(MODAL_ACTS[act]) MODAL_ACTS[act](val,tg);
  }
}
function startCall(){
  call = { id:uid(), timestamp:new Date().toISOString(), funnel:{}, objections:[], collateral:[] };
  objDraft=null;
  nav=[{screen:"home"},{screen:"qual",opts:{i:0}}]; render();
}
function setQual(val){
  const cur=nav[nav.length-1]; const i=cur.opts.i;
  call[QUAL[i].key]=val;
  render();
  setTimeout(()=>{ if(i+1<QUAL.length) go("qual",{i:i+1}); else go("collateral"); },150);
}
function toggleCollat(val){
  let s=call.collateral||[];
  if(val==="None"){ s = s.includes("None")?[]:["None"]; }
  else { s=s.filter(x=>x!=="None"); s.includes(val)? s=s.filter(x=>x!==val): s.push(val); }
  call.collateral=s; render();
}
function setStage(val){
  const [nm,st]=val.split("|");
  call.funnel[nm] = call.funnel[nm]===st? undefined : st;
  if(call.funnel[nm]===undefined) delete call.funnel[nm];
  render();
}
function afterOutcome(){ go("evalScreen"); }
function afterEval(){
  const needFollow = OUTCOME_FOLLOWUP.includes(call.outcome) || Object.values(call.funnel).includes("Postponed");
  if(needFollow) go("followup"); else go("review");
}
function saveFollowupFields(){
  const g=id=>{ const el=document.getElementById(id); return el?el.value.trim():""; };
  call.prospectName=g("f_name")||call.prospectName||"";
  call.followUpReason=g("f_reason");
  call.followUpDate=g("f_date");
  call.personalDetail=g("f_detail");
}
async function doSave(){
  const nameEl=document.getElementById("r_name"); if(nameEl) call.prospectName=(nameEl.value||"").trim();
  if(!OUTCOME_FOLLOWUP.includes(call.outcome) && !Object.values(call.funnel).includes("Postponed")){
    call.followUpReason=""; call.followUpDate=""; call.personalDetail="";
  }
  const c={...call};
  c.furthestStage = furthest(c.funnel)>=0? STAGES[furthest(c.funnel)] : "";
  c.dayOfWeek = DOW[new Date(c.timestamp).getDay()];
  c.hour = new Date(c.timestamp).getHours();
  try{
    toast(t("saving"));
    await Store.save(c);
    cache = cache||[]; cache.push(normalize(serialize(c)));
    call=null; nav=[{screen:"home"},{screen:"saved"}]; render();
  }catch(err){
    toast(t("saveFailed"), "bad");
    console.error(err);
  }
}
function reopen(id){
  const c=(cache||[]).find(x=>x.id===id); if(!c) return;
  call = { id:uid(), timestamp:new Date().toISOString(), funnel:{}, objections:[], collateral:[],
    prospectName:c.prospectName, prospectType:c.prospectType, mainGoal:c.mainGoal, loanSize:c.loanSize };
  objDraft=null;
  if(c.personalDetail||c.followUpReason) toast("📌 "+(c.personalDetail||c.followUpReason));
  nav=[{screen:"home"},{screen:"qual",opts:{i:0}}]; render();
}
async function delCall(id){
  if(!confirm(t("deleteConfirm"))) return;
  try{
    toast(t("deleting"));
    await Store.del(id);
    cache=(cache||[]).filter(x=>x.id!==id);   // optimistic remove
    nav=[{screen:"home"},{screen:"history"}]; render();
    toast(t("deleted"),"ok");
    loadCache(true);                          // re-sync from the store to confirm
  }catch(err){
    toast(t("deleteFailed"),"bad"); console.error(err);
  }
}

/* ============================ MODALS (objections) ============================ */
let objDraft = null;
const MODAL_ACTS = {};
function openModal(kind){
  closeOverlay();
  if(kind==="obj") renderObjModal();
}
function closeModal(){ modal=null; closeOverlay(); }
function closeOverlay(){ document.querySelectorAll(".overlay").forEach(o=>o.remove()); }
function renderObjModal(){
  if(!objDraft) objDraft={stage:STAGES[Math.max(0,furthest(call.funnel))]||STAGES[0], type:null, resolved:null};
  const list=(call.objections||[]);
  const ov=document.createElement("div"); ov.className="overlay";
  ov.innerHTML=`<div class="sheet">
    <h3>${esc(t("addObjection"))}</h3>
    ${list.length?`<div style="margin-bottom:12px">${list.map((o,i)=>`<span class="pill ${o.resolved==="Yes"?"ok":"bad"}" style="margin-inline-end:6px; margin-bottom:6px">${esc(lbl("objection",o.type))} ${o.resolved==="Yes"?"✓":"✕"} <b data-act="delobj" data-val="${i}" style="margin-inline-start:4px; cursor:pointer">×</b></span>`).join("")}</div>`:""}
    <label class="fld">${esc(t("stageLbl"))}</label>
    <select id="o_stage">${STAGES.map(s=>`<option value="${esc(s)}" ${objDraft.stage===s?"selected":""}>${esc(lbl("stage",s))}</option>`).join("")}</select>
    <label class="fld">${esc(t("objectionLbl"))}</label>
    <div class="chips">${OBJECTIONS.map(o=>`<button class="chip ${objDraft.type===o?"sel":""}" data-act="objtype" data-val="${esc(o)}">${esc(lbl("objection",o))}</button>`).join("")}</div>
    <label class="fld">${esc(t("resolvedQ"))}</label>
    <div class="chips">
      <button class="chip ${objDraft.resolved==="Yes"?"sel":""}" data-act="objres" data-val="Yes">${esc(t("yes"))}</button>
      <button class="chip ${objDraft.resolved==="No"?"sel":""}" data-act="objres" data-val="No">${esc(t("no"))}</button>
    </div>
    <div style="display:flex; gap:10px; margin-top:18px">
      <button class="btn ghost" data-act="closemodal" style="flex:0 0 38%">${esc(t("done"))}</button>
      <button class="btn primary" data-act="addobj">${esc(t("add"))}</button>
    </div>
  </div>`;
  ov.addEventListener("click", e=>{ if(e.target===ov) closeModal(); });
  document.body.appendChild(ov);
}
function syncObjStage(){ const s=document.getElementById("o_stage"); if(s) objDraft.stage=s.value; }
MODAL_ACTS.objtype=(v)=>{ syncObjStage(); objDraft.type=v; renderObjModal(); };
MODAL_ACTS.objres=(v)=>{ syncObjStage(); objDraft.resolved=v; renderObjModal(); };
MODAL_ACTS.delobj=(i)=>{ syncObjStage(); call.objections.splice(+i,1); renderObjModal(); render(); };
MODAL_ACTS.addobj=()=>{
  const stage=document.getElementById("o_stage").value;
  if(!objDraft.type){ toast(t("pickObjection"),"bad"); return; }
  call.objections.push({stage, type:objDraft.type, resolved:objDraft.resolved||"No"});
  objDraft={stage, type:null, resolved:null};
  toast(t("objAdded"),"ok"); renderObjModal(); render();
};

/* ============================ DATA / EXPORT ============================ */
async function loadCache(force){
  try{ cache = await Store.list(); }catch(e){ cache=cache||[]; toast(t("loadFailed"),"bad"); }
  render();
}
function exportCSV(){
  const rows=cache||[];
  if(!rows.length){ toast(t("noExport"),"bad"); return; }
  const cols=["id","timestamp","prospectName","prospectType","mainGoal","loanSize","creditCardAvailable","bankingIssues","employmentStatus","monthlyIncome","collateral","furthestStage","outcome","closingProbability","callQuality","trustLevel","urgency","followUpReason","followUpDate","personalDetail","funnel","objections"];
  const cell=v=>{ if(v==null)v=""; if(Array.isArray(v))v=v.join("|"); if(typeof v==="object")v=JSON.stringify(v); v=String(v); if(/^[=+\-@\t\r]/.test(v)) v="'"+v; v=v.replace(/"/g,'""'); return `"${v}"`; };
  const csv=[cols.join(",")].concat(rows.map(r=>cols.map(c=>cell(r[c])).join(","))).join("\n");
  const blob=new Blob([csv],{type:"text/csv"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="sales-tracker-"+new Date().toISOString().slice(0,10)+".csv"; a.click();
}
function loadSample(){
  LS.demo=true;
  const types=["Male","Female","Couple"], goals=["Debt Consolidation","Loan Refinance","New Loan","Other"];
  const sizes=["0–50K","50K–150K","150K+"], emps=["Employed","Self-employed","Unemployed","Retired"];
  const incs=["Low","Medium","High"], outs=OUTCOMES.map(o=>o[0]);
  const names = LANG==="he" ? ["דנה כהן","יוסי לוי","משה פרץ","נועה בר","אבי מזרחי","רוני גל","—"] : ["Marco R.","Sara B.","Luca & Anna","Giulia P.","Paolo M.","Elena V.","—"];
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const arr=[];
  for(let i=0;i<60;i++){
    const d=new Date(); d.setDate(d.getDate()-Math.floor(Math.random()*90)); d.setHours(9+Math.floor(Math.random()*9));
    const type=pick(types); const size=pick(sizes);
    let p=0.18; if(type==="Female")p+=0.12; if(size==="150K+")p+=0.18; if(size==="0–50K")p-=0.06;
    const won=Math.random()<p;
    const reach = won? 14 : Math.floor(Math.random()*13);
    const funnel={}; for(let s=0;s<=reach;s++){ funnel[STAGES[s]]= (s===reach&&!won)? pick(["Failed","Postponed"]) : "Passed"; }
    const objs=[]; if(Math.random()<0.6) objs.push({stage:pick(STAGES.slice(0,reach+1)||STAGES), type:pick(OBJECTIONS), resolved:won?"Yes":pick(["Yes","No"])});
    arr.push(normalize(serialize({
      id:uid(), timestamp:d.toISOString(), prospectName:pick(names),
      prospectType:type, mainGoal:pick(goals), loanSize:size, creditCardAvailable:pick(["Yes","No"]),
      bankingIssues:pick(["Yes","No"]), employmentStatus:pick(emps), monthlyIncome:pick(incs),
      collateral:pick([["Real Estate"],["Vehicle"],["None"],["Pension Fund","Real Estate"]]),
      funnel, objections:objs, outcome: won?"Closed":pick(outs.filter(o=>o!=="Closed")),
      closingProbability:pick([10,30,50,70,90]), callQuality:1+Math.floor(Math.random()*10),
      trustLevel:1+Math.floor(Math.random()*10), urgency:1+Math.floor(Math.random()*10),
    })));
  }
  demoSave(arr); loadCache(true); toast(t("sampleLoaded"),"ok");
}

/* ============================ BOOT ============================ */
applyDir();
nav=[{screen:"home"}];
render();
loadCache();
</script>
